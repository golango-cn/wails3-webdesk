<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDesk</title>
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
    {
        "imports": {
            "@wailsio/runtime": "./node_modules/@wailsio/runtime/dist/index.js"
        }
    }
    </script>
</head>
<body>
    <div class="app">
        <div class="titlebar" id="titlebar">
            <div class="titlebar-drag">
                <span class="titlebar-icon"><svg viewBox="0 0 32 32" width="14" height="14" fill="none"><rect x="2" y="4" width="28" height="20" rx="3" stroke="currentColor" stroke-width="1.8" opacity="0.7"/><rect x="5" y="7" width="10" height="8" rx="1.5" fill="currentColor" opacity="0.9"/><rect x="17" y="7" width="10" height="5" rx="1.5" fill="currentColor" opacity="0.5"/><rect x="5" y="17" width="22" height="4" rx="1" fill="currentColor" opacity="0.3"/><rect x="2" y="26" width="28" height="4" rx="1.5" fill="currentColor" opacity="0.2"/></svg></span>
                <span class="titlebar-title" id="titlebar-title">WebDesk</span>
            </div>
            <div class="titlebar-controls">
                <button class="titlebar-btn" id="btn-minimize" title="最小化">
                    <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="5.5" width="10" height="1" fill="currentColor"/></svg>
                </button>
                <button class="titlebar-btn" id="btn-maximize" title="最大化">
                    <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
                </button>
                <button class="titlebar-btn titlebar-btn-close" id="btn-close" title="关闭">
                    <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2L10 10M10 2L2 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                </button>
            </div>
        </div>
        <div class="app-body">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon"><svg viewBox="0 0 32 32" width="24" height="24" fill="none"><rect x="2" y="4" width="28" height="20" rx="3" stroke="currentColor" stroke-width="1.8" opacity="0.7"/><rect x="5" y="7" width="10" height="8" rx="1.5" fill="currentColor" opacity="0.9"/><rect x="17" y="7" width="10" height="5" rx="1.5" fill="currentColor" opacity="0.5"/><rect x="5" y="17" width="22" height="4" rx="1" fill="currentColor" opacity="0.3"/><rect x="2" y="26" width="28" height="4" rx="1.5" fill="currentColor" opacity="0.2"/></svg></span>
                    <span class="logo-text">WebDesk</span>
                </div>
            </div>
            <div class="sidebar-search">
                <input type="text" id="search-input" placeholder="搜索站点..." class="search-input">
            </div>
            <div class="sidebar-content" id="sites-container">
            </div>
            <div class="sidebar-footer">
                <button class="btn-add" id="btn-add-site" title="添加站点">
                    <span class="btn-icon">+</span>
                    <span class="btn-text">添加站点</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <button class="sidebar-toggle" id="btn-sidebar-toggle" title="切换侧边栏">☰</button>
            <div class="theme-panel" id="theme-panel">
                <div class="theme-colors">
                    <button class="theme-dot active" data-theme="indigo" style="--dot-color:#818cf8" title="靛蓝"></button>
                    <button class="theme-dot" data-theme="cyan" style="--dot-color:#22d3ee" title="青蓝"></button>
                    <button class="theme-dot" data-theme="rose" style="--dot-color:#fb7185" title="玫瑰"></button>
                    <button class="theme-dot" data-theme="amber" style="--dot-color:#fbbf24" title="琥珀"></button>
                    <button class="theme-dot" data-theme="emerald" style="--dot-color:#34d399" title="翠绿"></button>
                    <button class="theme-dot" data-theme="lavender" style="--dot-color:#b4befe" title="薰衣草"></button>
                    <button class="theme-dot" data-theme="peach" style="--dot-color:#fab387" title="蜜桃"></button>
                    <button class="theme-dot" data-theme="mauve" style="--dot-color:#cba6f7" title="紫藤"></button>
                    <button class="theme-dot" data-theme="teal" style="--dot-color:#2dd4bf" title="碧波"></button>
                    <button class="theme-dot" data-theme="sky" style="--dot-color:#38bdf8" title="天际"></button>
                </div>
            </div>
            <div class="welcome-screen" id="welcome-screen">
                <div class="welcome-icon"><svg viewBox="0 0 64 64" width="64" height="64" fill="none"><rect x="4" y="8" width="56" height="40" rx="5" stroke="currentColor" stroke-width="2.5" opacity="0.25"/><rect x="9" y="14" width="20" height="16" rx="3" fill="currentColor" opacity="0.6"/><rect x="33" y="14" width="20" height="10" rx="3" fill="currentColor" opacity="0.35"/><rect x="9" y="34" width="44" height="8" rx="2" fill="currentColor" opacity="0.2"/><rect x="4" y="52" width="56" height="8" rx="3" fill="currentColor" opacity="0.15"/></svg></div>
                <h1 class="welcome-title">WebDesk</h1>
                <p class="welcome-desc">从左侧选择一个站点开始，或点击「添加站点」配置你的常用网站</p>
                <div class="welcome-shortcuts" id="welcome-shortcuts"></div>
            </div>
            <iframe id="site-frame" class="site-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-downloads allow-modals allow-popups-to-escape-sandbox" allow="clipboard-read; clipboard-write" style="display:none;"></iframe>
        </main>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="site-modal">
            <div class="modal-header">
                <h2 id="modal-title">添加站点</h2>
                <button class="modal-close" id="btn-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="input-name">站点名称</label>
                    <input type="text" id="input-name" placeholder="例如：公司邮箱" class="form-input">
                </div>
                <div class="form-group">
                    <label for="input-url">站点地址</label>
                    <input type="text" id="input-url" placeholder="例如：mail.company.com" class="form-input">
                </div>
                <div class="form-group">
                    <label for="input-icon">图标 (Emoji)</label>
                    <div class="icon-picker">
                        <input type="text" id="input-icon" placeholder="🌐" class="form-input icon-input" maxlength="2">
                        <div class="icon-suggestions" id="icon-suggestions">
                            <span class="icon-option" data-icon="📧">📧</span>
                            <span class="icon-option" data-icon="📊">📊</span>
                            <span class="icon-option" data-icon="📝">📝</span>
                            <span class="icon-option" data-icon="🐙">🐙</span>
                            <span class="icon-option" data-icon="📋">📋</span>
                            <span class="icon-option" data-icon="🔧">🔧</span>
                            <span class="icon-option" data-icon="💬">💬</span>
                            <span class="icon-option" data-icon="📁">📁</span>
                            <span class="icon-option" data-icon="🎓">🎓</span>
                            <span class="icon-option" data-icon="🔍">🔍</span>
                            <span class="icon-option" data-icon="☁️">☁️</span>
                            <span class="icon-option" data-icon="🎨">🎨</span>
                            <span class="icon-option" data-icon="📱">📱</span>
                            <span class="icon-option" data-icon="🔒">🔒</span>
                            <span class="icon-option" data-icon="🌐">🌐</span>
                            <span class="icon-option" data-icon="📚">📚</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="input-category">分类</label>
                    <input type="text" id="input-category" placeholder="例如：常用、开发、办公" class="form-input" list="category-list">
                    <datalist id="category-list"></datalist>
                </div>
                <div class="form-group">
                    <label for="input-openmode">打开方式</label>
                    <select id="input-openmode" class="form-input">
                        <option value="embed">内嵌显示</option>
                        <option value="chrome">Chrome 打开</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="btn-cancel">取消</button>
                <button class="btn-save" id="btn-save">保存</button>
            </div>
        </div>

        <div class="modal context-menu" id="context-menu">
            <button class="context-item" id="ctx-edit">✏️ 编辑站点</button>
            <button class="context-item" id="ctx-chrome">🖥️ 用 Chrome 打开</button>
            <button class="context-item" id="ctx-shortcut">🔗 创建快捷方式</button>
            <button class="context-item context-item-danger" id="ctx-delete">🗑️ 删除站点</button>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
